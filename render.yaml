services:
  - type: web
    name: binaskar-org
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /ar
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_PUBLIC_SITE_URL
        value: https://binaskar.org
      - key: CONTACT_EMAIL
        value: abdullah@binaskar.org
      - key: SMTP_HOST
        value: mail.privateemail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: abdullah@binaskar.org
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: Bin Askar Technology
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: Bin Askar Technology <abdullah@binaskar.org>
